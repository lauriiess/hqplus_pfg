name: hq_mobapp
description: HealthQueue+ Patient Mobile App
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.2
  # HTTP client
  http: ^1.2.1
  # Secure local storage (for JWT token)
  flutter_secure_storage: ^9.0.0
  # Local key-value storage (for user cache)
  shared_preferences: ^2.2.3
  # Date formatting
  intl: ^0.19.0
  # Google Fonts
  google_fonts: ^6.2.1
  # URL launcher (for phone/map links)
  url_launcher: ^6.2.6
  # Environment variables from .env
  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
